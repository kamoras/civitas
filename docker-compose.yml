services:
  ollama:
    image: ollama/ollama:latest
    container_name: mp-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mp-backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - DATABASE_URL=sqlite:////data/modern-punk.db
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - app_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mp-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # nginx container disabled — host nginx serves on port 8081 instead
  # (port 80 is in use by another service on this host)

volumes:
  ollama_data:
    driver: local
  app_data:
    driver: local
