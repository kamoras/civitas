# For development or simple usage: docker compose up -d
# For zero-downtime production deploys: ./deploy.sh (manages frontend/backend separately)
services:
  ollama:
    image: ollama/ollama:latest
    container_name: mp-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_KEEP_ALIVE=30m
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 10G
        reservations:
          memory: 6G
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mp-backend
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=sqlite:////data/modern-punk.db
      - OLLAMA_BASE_URL=http://mp-ollama:11434
      - LLM_BACKEND=llama-server
      - LLAMA_SERVER_URL=http://host.docker.internal:8070
    volumes:
      - app_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mp-frontend
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # nginx container disabled — host nginx serves on port 8081 instead
  # (port 80 is in use by another service on this host)

volumes:
  ollama_data:
    driver: local
  app_data:
    driver: local
