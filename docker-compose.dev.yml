services:
  backend:
    build:
      context: ./backend
    volumes:
      - ./backend/app:/app/app
      - app_data:/data
    environment:
      - PIPELINE_LOG_LEVEL=debug
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      target: deps
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    command: npx next dev
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api

volumes:
  app_data:
    driver: local
