name: CD (Pi Deploy)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch: {}   # manual "redeploy" button, Vercel-style

concurrency:
  group: civitas-deploy
  cancel-in-progress: false

jobs:
  deploy:
    # SECURITY INVARIANT — see AGENTS.md "CI/CD & self-hosted runner" section.
    # This job runs on a self-hosted runner (the physical Pi). It must NEVER
    # be triggered by `pull_request`/`pull_request_target` — only by
    # `workflow_run` gated to head_branch == main (i.e. only after a push
    # lands on main) or manual `workflow_dispatch`. Anyone who can open a PR
    # must never be able to cause code to execute on this runner.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.event == 'push')
    runs-on: [self-hosted, civitas-pi]
    permissions:
      contents: read
      packages: read
    steps:
      # DEPLOY_PATH is not hardcoded here — it comes from the runner's own
      # ~/actions-runner/.env (a self-hosted GitHub Actions runner loads
      # that file into every job's environment automatically). Registering
      # a runner on a new device only requires setting DEPLOY_PATH there;
      # nothing in this workflow needs to change. See AGENTS.md "CI/CD &
      # self-hosted runner" for the full runner-setup steps.
      - name: Check DEPLOY_PATH is configured
        run: |
          if [ -z "${DEPLOY_PATH:-}" ]; then
            echo "::error::DEPLOY_PATH is not set on this runner. Add DEPLOY_PATH=/path/to/repo to ~/actions-runner/.env and restart the runner service."
            exit 1
          fi
          echo "Deploying to $DEPLOY_PATH"

      - name: Pull latest main
        run: |
          cd "$DEPLOY_PATH"
          git fetch origin main
          git reset --hard origin/main

      # .env is generated here, every deploy, from GitHub Secrets — it is
      # NOT a file to hand-edit on the Pi anymore. A local edit would just
      # get silently overwritten on the next push. To change a value:
      # `gh secret set NAME` and push (or `gh workflow run cd.yml`).
      - name: Write .env from secrets
        run: |
          cat > "$DEPLOY_PATH/.env" <<EOF
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          DATA_GOV_API_KEY=${{ secrets.DATA_GOV_API_KEY }}
          OLLAMA_BASE_URL=${{ secrets.OLLAMA_BASE_URL }}
          OLLAMA_MODEL=${{ secrets.OLLAMA_MODEL }}
          LLM_BACKEND=${{ secrets.LLM_BACKEND }}
          LLAMA_SERVER_URL=${{ secrets.LLAMA_SERVER_URL }}
          PIPELINE_CACHE_TTL_HOURS=${{ secrets.PIPELINE_CACHE_TTL_HOURS }}
          PIPELINE_CRON_SCHEDULE=${{ secrets.PIPELINE_CRON_SCHEDULE }}
          PIPELINE_LOG_LEVEL=${{ secrets.PIPELINE_LOG_LEVEL }}
          PIPELINE_TRIGGER_TOKEN=${{ secrets.PIPELINE_TRIGGER_TOKEN }}
          ADMIN_TOKEN=${{ secrets.ADMIN_TOKEN }}
          BSKY_HANDLE=${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD=${{ secrets.BSKY_APP_PASSWORD }}
          GITHUB_FEEDBACK_TOKEN=${{ secrets.GITHUB_FEEDBACK_TOKEN }}
          EOF
          chmod 600 "$DEPLOY_PATH/.env"

      # TEMPORARILY building locally on the Pi again instead of pulling from
      # GHCR — see task/AGENTS.md note: images built on GitHub's hosted
      # ubuntu-24.04-arm runners (server-grade Ampere/Cobalt CPUs) crashed
      # the backend on the Pi's Cortex-A76 cores with SIGILL (exit 132),
      # consistently at ChromaDB/onnxruntime init — those runners support
      # instruction-set extensions the Pi doesn't. Building on the Pi itself
      # is guaranteed instruction-set-compatible since it's the target
      # hardware. Revert to SKIP_BUILD=1 + GHCR pull once the cross-build is
      # fixed to target a generic ARMv8-A baseline (see AGENTS.md).
      - name: Deploy
        run: |
          cd "$DEPLOY_PATH"
          ./deploy.sh
