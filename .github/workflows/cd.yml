name: CD (Pi Deploy)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch: {}   # manual "redeploy" button, Vercel-style

concurrency:
  group: civitas-deploy
  cancel-in-progress: false

jobs:
  deploy:
    # SECURITY INVARIANT — see AGENTS.md "CI/CD & self-hosted runner" section.
    # This job runs on a self-hosted runner (the physical Pi). It must NEVER
    # be triggered by `pull_request`/`pull_request_target` — only by
    # `workflow_run` gated to head_branch == main (i.e. only after a push
    # lands on main) or manual `workflow_dispatch`. Anyone who can open a PR
    # must never be able to cause code to execute on this runner.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.event == 'push')
    runs-on: [self-hosted, civitas-pi]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Pull latest main
        run: |
          cd /mnt/nvme/modern-punk
          git fetch origin main
          git reset --hard origin/main

      # .env is generated here, every deploy, from GitHub Secrets — it is
      # NOT a file to hand-edit on the Pi anymore. A local edit would just
      # get silently overwritten on the next push. To change a value:
      # `gh secret set NAME` and push (or `gh workflow run cd.yml`).
      - name: Write .env from secrets
        run: |
          cat > /mnt/nvme/modern-punk/.env <<EOF
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          DATA_GOV_API_KEY=${{ secrets.DATA_GOV_API_KEY }}
          OLLAMA_BASE_URL=${{ secrets.OLLAMA_BASE_URL }}
          OLLAMA_MODEL=${{ secrets.OLLAMA_MODEL }}
          LLM_BACKEND=${{ secrets.LLM_BACKEND }}
          LLAMA_SERVER_URL=${{ secrets.LLAMA_SERVER_URL }}
          PIPELINE_CACHE_TTL_HOURS=${{ secrets.PIPELINE_CACHE_TTL_HOURS }}
          PIPELINE_CRON_SCHEDULE=${{ secrets.PIPELINE_CRON_SCHEDULE }}
          PIPELINE_LOG_LEVEL=${{ secrets.PIPELINE_LOG_LEVEL }}
          PIPELINE_TRIGGER_TOKEN=${{ secrets.PIPELINE_TRIGGER_TOKEN }}
          ADMIN_TOKEN=${{ secrets.ADMIN_TOKEN }}
          BSKY_HANDLE=${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD=${{ secrets.BSKY_APP_PASSWORD }}
          EOF
          chmod 600 /mnt/nvme/modern-punk/.env

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pre-built images
        run: |
          docker pull ghcr.io/${{ github.repository }}/backend:latest
          docker pull ghcr.io/${{ github.repository }}/frontend:latest
          docker tag ghcr.io/${{ github.repository }}/backend:latest civitas-backend:latest
          docker tag ghcr.io/${{ github.repository }}/frontend:latest civitas-frontend:latest

      - name: Deploy
        run: |
          cd /mnt/nvme/modern-punk
          SKIP_BUILD=1 ./deploy.sh
