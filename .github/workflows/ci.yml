name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  backend-fast:
    name: Backend — Fast Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc g++ libxml2-dev libxslt-dev

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: Run fast tests (no embedding model)
        run: python -m pytest tests/ -v -m "not slow"

  backend-image:
    name: Backend — Docker Image Builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Catches image-level breakage (e.g. requirements conflicts that
      # only surface in the container build — an inconsistent Dependabot
      # pin made main undeployable for a day in 2026-07).
      - name: Build backend image (amd64 smoke build)
        run: docker build backend/

  backend-slow:
    name: Backend — Embedding Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc g++ libxml2-dev libxslt-dev

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: Cache sentence-transformer model
        uses: actions/cache@v6
        with:
          path: ~/.cache/huggingface
          key: st-model-all-MiniLM-L6-v2

      - name: Run slow tests (loads embedding model)
        run: python -m pytest tests/ -v -m slow
