name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default GITHUB_TOKEN permissions are broader than any job here needs (none
# push packages, comment on PRs, or write releases) — scope down to
# read-only.
permissions:
  contents: read

jobs:
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  backend-fast:
    name: Backend — Fast Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v7
        with:
          # Full history: the diff-coverage gate below compares against
          # origin/main, which a depth-1 checkout doesn't have.
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc g++ libxml2-dev libxslt-dev

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: Lint (ruff)
        # Pinned: ruff 0.16.0 (released 2026-07-23) flags 345 pre-existing
        # violations repo-wide, breaking every PR the moment it hit PyPI.
        # Upgrade deliberately (bump the pin + fix the new findings in one
        # PR), not implicitly via whatever version `pip install ruff` grabs.
        run: |
          pip install "ruff==0.15.4"
          ruff check app/

      # Two-part coverage gate:
      #   1. TOTAL floor (--cov-fail-under=46): a regression backstop only
      #      — measured 47.6% when introduced (2026-07-22). It stops
      #      test deletion; it is not the mechanism that raises coverage.
      #   2. CHANGED-LINES gate (diff-cover, next step): the driver. Every
      #      PR's new/modified lines must be 60%+ covered — above the
      #      ~48% total, so each merge mathematically pulls the total UP.
      #      60 was calibrated against this repo's own recent well-tested
      #      work (the last 8 commits measured 62% patch coverage —
      #      pipeline orchestration loops resist unit testing), per the
      #      repo's fit-thresholds-against-real-data convention, not an
      #      aspirational number that routine fixes can't meet. Ratchet
      #      it up (60 -> 70 -> 80) as testing culture matures; when the
      #      total rises meaningfully, drag the floor up behind it.
      - name: Run fast tests with total-coverage floor (no embedding model)
        run: >
          python -m pytest tests/ -v -m "not slow"
          --cov=app --cov-report=term --cov-report=html --cov-report=xml
          --cov-fail-under=46

      - name: Changed-lines coverage gate (diff-cover)
        run: >
          diff-cover coverage.xml --compare-branch=origin/main
          --fail-under=60 --markdown-report diff_coverage.md

      # Both reports on the Actions run summary page — the canonical
      # "where does coverage stand" view, no external service.
      - name: Publish coverage reports to job summary
        if: always()
        run: |
          echo "## Changed-lines coverage (gate: 60%)" >> "$GITHUB_STEP_SUMMARY"
          cat diff_coverage.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "_no diff coverage report generated_" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Total backend coverage (floor: 46%)" >> "$GITHUB_STEP_SUMMARY"
          coverage report --format=markdown --skip-empty >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-html
          path: backend/htmlcov/
          retention-days: 14

  backend-image:
    name: Backend — Docker Image Builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Catches image-level breakage (e.g. requirements conflicts that
      # only surface in the container build — an inconsistent Dependabot
      # pin made main undeployable for a day in 2026-07).
      - name: Build backend image (amd64 smoke build)
        run: docker build backend/

  backend-slow:
    name: Backend — Embedding Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc g++ libxml2-dev libxslt-dev

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: Cache sentence-transformer model
        uses: actions/cache@v6
        with:
          path: ~/.cache/huggingface
          key: st-model-all-MiniLM-L6-v2

      - name: Run slow tests (loads embedding model)
        run: python -m pytest tests/ -v -m slow
