name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default GITHUB_TOKEN permissions are broader than any job here needs (none
# push packages, comment on PRs, or write releases) — scope down to
# read-only by default. build-and-push already declares its own narrower
# job-level permissions (contents: read, packages: write) for the one thing
# it actually needs, which overrides this.
permissions:
  contents: read

jobs:
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  backend-fast:
    name: Backend — Fast Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc g++ libxml2-dev libxslt-dev

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check app/

      # Coverage gate: measured 47.6% when introduced (2026-07-22); the
      # threshold sits ~1.5pt under the real number so ordinary
      # fluctuation doesn't break CI, and should be RATCHETED UP (never
      # down) as coverage genuinely improves — raise it to (current - 1)
      # whenever a PR meaningfully lifts the number. Gate covers the fast
      # suite only; the embedding job is main-only and adds little line
      # coverage.
      - name: Run fast tests with coverage gate (no embedding model)
        run: >
          python -m pytest tests/ -v -m "not slow"
          --cov=app --cov-report=term --cov-report=html
          --cov-fail-under=46

      # The per-file coverage table on the Actions run summary page — the
      # canonical "where does coverage stand" report, no external service.
      - name: Publish coverage report to job summary
        if: always()
        run: |
          echo "## Backend coverage" >> "$GITHUB_STEP_SUMMARY"
          coverage report --format=markdown --skip-empty >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-html
          path: backend/htmlcov/
          retention-days: 14

  backend-image:
    name: Backend — Docker Image Builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Catches image-level breakage (e.g. requirements conflicts that
      # only surface in the container build — an inconsistent Dependabot
      # pin made main undeployable for a day in 2026-07).
      - name: Build backend image (amd64 smoke build)
        run: docker build backend/

  backend-slow:
    name: Backend — Embedding Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc g++ libxml2-dev libxslt-dev

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: Cache sentence-transformer model
        uses: actions/cache@v6
        with:
          path: ~/.cache/huggingface
          key: st-model-all-MiniLM-L6-v2

      - name: Run slow tests (loads embedding model)
        run: python -m pytest tests/ -v -m slow

  build-and-push:
    name: Build & Push Images
    # DISABLED (2026-07-12) — cd.yml no longer consumes these images (see
    # AGENTS.md "CI/CD & self-hosted runner"), because the backend image
    # built here SIGILL'd in production: hnswlib (chromadb's HNSW C++ lib)
    # has no prebuilt aarch64 wheel, so pip compiles it from source on
    # whichever machine runs the build — this ubuntu-24.04-arm runner is a
    # different ARM64 microarchitecture (server-grade Ampere/Cobalt) than
    # the Pi 5 (Cortex-A76) actually running it. Running this job anyway
    # would keep publishing a known-broken :latest to GHCR that looks fine
    # (build succeeds) but crashes on first real use — worse than just
    # wasted CI time. Re-enable (`if: false` -> real condition) only after
    # verifying a build here survives past ChromaDB init on the Pi, not
    # just the HTTP health check.
    if: false
    runs-on: ubuntu-24.04-arm
    needs: [frontend, backend-fast, backend-image, backend-slow]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build & push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
